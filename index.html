<!DOCTYPE html>
<html>
<head>
  <title>Card Form</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      position: relative;
      width: 420px;
      height: 820px; /* increased height to fit Google Form */
      background: url('card.png') no-repeat center/cover;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      color: white;
      overflow: hidden;
    }

    .card iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }

  </style>
</head>
<body>

<div class="card">
  <iframe 
    src="https://docs.google.com/forms/d/e/1FAIpQLSeLOQkeADnMfApi9CY7nVq9wf-mj8Ljsm8VLbbjIO6Rg0y3AQ/viewform?embedded=true"
    width="100%" 
    height="100%" 
    frameborder="0" 
    marginheight="0" 
    marginwidth="0">
    Loading…
  </iframe>
</div>

</body>
</html>
